<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stereogram Viewer</title>
  <link rel="icon" href="favicon.ico" sizes="32x32" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a1a" />
  <link rel="stylesheet" href="style.css?v=8" />
  <!-- Umami: ERR_BLOCKED_BY_CLIENT in DevTools is ad blockers / privacy tools blocking the tracker -->
  <script defer src="https://umami.cloete.link/script.js" data-website-id="22cc2504-e600-4863-a48e-a114857abe0d"></script>
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-inner">

      <div id="sidebar-header">
        <h1>Stereogram<br>Viewer</h1>
      </div>

      <div class="sidebar-section">
        <div class="file-group">
          <span class="ctrl-label">Left</span>
          <label class="file-btn">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 1a.75.75 0 0 1 .75.75v5.5h5.5a.75.75 0 0 1 0 1.5h-5.5v5.5a.75.75 0 0 1-1.5 0v-5.5H1.75a.75.75 0 0 1 0-1.5h5.5v-5.5A.75.75 0 0 1 8 1z"/>
            </svg>
            Choose
            <input type="file" id="file-left" accept="image/*" />
          </label>
          <span class="file-name" id="name-left">none</span>
        </div>

        <div class="file-group">
          <span class="ctrl-label">Right</span>
          <label class="file-btn">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 1a.75.75 0 0 1 .75.75v5.5h5.5a.75.75 0 0 1 0 1.5h-5.5v5.5a.75.75 0 0 1-1.5 0v-5.5H1.75a.75.75 0 0 1 0-1.5h5.5v-5.5A.75.75 0 0 1 8 1z"/>
            </svg>
            Choose
            <input type="file" id="file-right" accept="image/*" />
          </label>
          <span class="file-name" id="name-right">none</span>
        </div>
      </div>

      <div class="sidebar-sep"></div>

      <div class="sidebar-section">
        <div class="ctrl-group">
          <span class="ctrl-label">Size</span>
          <div class="ctrl-row">
            <input type="range" id="ctrl-size" min="10" max="100" value="50" step="1" />
            <span class="ctrl-value" id="val-size">50%</span>
          </div>
        </div>

        <div class="ctrl-group">
          <span class="ctrl-label">Gap</span>
          <div class="ctrl-row">
            <input type="range" id="ctrl-gap" min="0" max="30" value="4" step="1" />
            <span class="ctrl-value" id="val-gap">4 px</span>
          </div>
        </div>

        <div class="ctrl-group">
          <span class="ctrl-label">Crop</span>
          <div class="ctrl-row">
            <input type="range" id="ctrl-crop" min="10" max="100" value="100" step="1" />
            <span class="ctrl-value" id="val-crop">100%</span>
          </div>
        </div>
      </div>

      <div class="sidebar-sep"></div>

      <div class="sidebar-section">
        <div class="ctrl-group">
          <span class="ctrl-label">Examples</span>
        </div>
        <select id="select-example">
          <option value="" selected>— load example —</option>
          <option value="flowers">Flowers</option>
          <option value="cathedral_landscape">Cathedral landscape</option>
          <option value="cathedral_portrait">Cathedral portrait</option>
        </select>
      </div>

      <div class="sidebar-sep"></div>

      <div class="sidebar-section">
        <button class="btn" id="btn-swap">⇄ Swap</button>
        <button class="btn" id="btn-fit">Fit</button>
        <button class="btn" id="btn-center">Reset pan</button>
        <button class="btn" id="btn-reset">Reset zoom</button>
      </div>

      <!-- spacer pushes instructions to bottom -->
      <div style="flex:1"></div>

      <div id="instructions">
        <div class="instr"><span class="key">scroll</span> zoom</div>
        <div class="instr"><span class="key">drag</span> pan</div>
        <div class="instr"><span class="key">← →</span> size</div>
        <div class="instr"><span class="key">↑ ↓</span> zoom</div>
      </div>

      <a id="github-link" href="https://github.com/cbbldtgthr/stereogram-viewer" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
            0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
            -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
            .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
            -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
            .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
            .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
            0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        GitHub
      </a>

    </div>
  </div>

  <!-- Viewer -->
  <div id="viewer">
    <div id="hint">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="4" y="12" width="24" height="40" rx="3"/>
        <rect x="36" y="12" width="24" height="40" rx="3"/>
        <line x1="16" y1="28" x2="16" y2="44"/>
        <line x1="8" y1="36" x2="24" y2="36"/>
        <circle cx="48" cy="36" r="7"/>
        <line x1="53" y1="41" x2="58" y2="46"/>
      </svg>
      <p>Choose left and right images to begin</p>
      <small>Scroll to zoom · Drag to pan</small>
    </div>

    <div id="row">
      <div class="frame" id="frame-left">
        <img id="img-left" />
        <div class="crosshair" id="cross-left"></div>
      </div>
      <div id="frame-gap"></div>
      <div class="frame" id="frame-right">
        <img id="img-right" />
        <div class="crosshair" id="cross-right"></div>
      </div>
    </div>

    <div id="zoom-badge">100%</div>
  </div>

  <!-- Outside #viewer so z-index can sit above the overlay sidebar (stacking context fix) -->
  <button id="sidebar-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">
    <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor">
      <path d="M3.5 3a.5.5 0 0 0 0 1h9a.5.5 0 0 0 0-1h-9zm0 4a.5.5 0 0 0 0 1h9a.5.5 0 0 0 0-1h-9zm0 4a.5.5 0 0 0 0 1h9a.5.5 0 0 0 0-1h-9z"/>
    </svg>
  </button>

</div>
<script src="app.js?v=11"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
