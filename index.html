<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stereogram Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --surface2: #242429;
      --border: #2e2e36;
      --accent: #7c6af7;
      --accent-dim: #4e46a0;
      --text: #e8e8f0;
      --text-dim: #888898;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #topbar h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .divider {
      width: 1px;
      height: 24px;
      background: var(--border);
      flex-shrink: 0;
    }

    .file-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .file-label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

    .file-btn {
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      transition: border-color .15s, background .15s;
      white-space: nowrap;
    }
    .file-btn:hover { border-color: var(--accent); background: #2a2a32; }
    .file-btn input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 0;
    }

    .file-name {
      font-size: 12px;
      color: var(--text-dim);
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-name.loaded { color: #7ecf8e; }

    .ctrl-group { display: flex; align-items: center; gap: 8px; }
    .ctrl-label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

    input[type=range] {
      -webkit-appearance: none;
      width: 90px; height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      cursor: pointer;
    }

    .ctrl-value { font-size: 12px; color: var(--text); min-width: 36px; text-align: right; }

    .btn {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--accent); background: #2a2a32; }

    /* ── Viewer ── */
    #viewer {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: grab;
    }
    #viewer.dragging { cursor: grabbing; }
    #viewer.dragging .frame { cursor: none; }

    /* hint overlay */
    #hint {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      pointer-events: none;
      color: var(--text-dim);
      z-index: 10;
    }
    #hint svg { opacity: 0.25; }
    #hint p { font-size: 15px; opacity: 0.5; }
    #hint small { font-size: 13px; opacity: 0.35; }
    #hint.hidden { display: none; }

    /*
      #row: the draggable container holding both frames side by side.
      Drag moves #row. Scroll zooms the images *within* their frames.
    */
    #row {
      position: absolute;
      top: 0; left: 0;
      display: flex;
      align-items: flex-start;
      transform-origin: 0 0;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Each frame clips its image */
    .frame {
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      border-radius: 4px;
      background: #111;
      cursor: none;
    }

    .frame img {
      display: block;
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      pointer-events: none;
      /* width set by JS, height auto */
    }

    #frame-gap {
      flex-shrink: 0;
      align-self: stretch;
    }


    /* zoom badge */
    #zoom-badge {
      position: absolute;
      bottom: 14px; right: 18px;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text-dim);
      pointer-events: none;
      opacity: 0;
      transition: opacity .3s;
    }
    #zoom-badge.visible { opacity: 1; }

    /* ── Crosshair cursor ── */
    .crosshair {
      position: absolute;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      display: none;
    }
    .crosshair::before,
    .crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 0 2px rgba(0,0,0,0.8);
    }
    /* horizontal bar */
    .crosshair::before { left: 0; right: 0; top: 50%; height: 1px; margin-top: -0.5px; }
    /* vertical bar */
    .crosshair::after  { top: 0; bottom: 0; left: 50%; width: 1px; margin-left: -0.5px; }
    .crosshair.visible { display: block; }
  </style>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <h1>Stereogram Viewer</h1>
    <div class="divider"></div>

    <div class="file-group">
      <span class="file-label">Left</span>
      <label class="file-btn">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 1a.75.75 0 0 1 .75.75v5.5h5.5a.75.75 0 0 1 0 1.5h-5.5v5.5a.75.75 0 0 1-1.5 0v-5.5H1.75a.75.75 0 0 1 0-1.5h5.5v-5.5A.75.75 0 0 1 8 1z"/>
        </svg>
        Choose
        <input type="file" id="file-left" accept="image/*" />
      </label>
      <span class="file-name" id="name-left">none</span>
    </div>

    <div class="file-group">
      <span class="file-label">Right</span>
      <label class="file-btn">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 1a.75.75 0 0 1 .75.75v5.5h5.5a.75.75 0 0 1 0 1.5h-5.5v5.5a.75.75 0 0 1-1.5 0v-5.5H1.75a.75.75 0 0 1 0-1.5h5.5v-5.5A.75.75 0 0 1 8 1z"/>
        </svg>
        Choose
        <input type="file" id="file-right" accept="image/*" />
      </label>
      <span class="file-name" id="name-right">none</span>
    </div>

    <div class="divider"></div>

    <div class="ctrl-group">
      <span class="ctrl-label">Size</span>
      <input type="range" id="ctrl-size" min="10" max="100" value="50" step="1" />
      <span class="ctrl-value" id="val-size">50%</span>
    </div>

    <div class="ctrl-group">
      <span class="ctrl-label">Gap</span>
      <input type="range" id="ctrl-gap" min="0" max="30" value="4" step="1" />
      <span class="ctrl-value" id="val-gap">4 px</span>
    </div>

    <div class="divider"></div>

    <button class="btn" id="btn-swap">⇄ Swap</button>
    <button class="btn" id="btn-center">Reset pan</button>
    <button class="btn" id="btn-reset">Reset zoom</button>
  </div>

  <!-- Viewer -->
  <div id="viewer">
    <div id="hint">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="4" y="12" width="24" height="40" rx="3"/>
        <rect x="36" y="12" width="24" height="40" rx="3"/>
        <line x1="16" y1="28" x2="16" y2="44"/>
        <line x1="8" y1="36" x2="24" y2="36"/>
        <circle cx="48" cy="36" r="7"/>
        <line x1="53" y1="41" x2="58" y2="46"/>
      </svg>
      <p>Choose left and right images to begin</p>
      <small>Scroll to zoom within each frame · Drag to pan within frames</small>
    </div>

    <!-- Row: draggable, contains both frames -->
    <div id="row">
      <div class="frame" id="frame-left">
        <img id="img-left" />
        <div class="crosshair" id="cross-left"></div>
      </div>
      <div id="frame-gap"></div>
      <div class="frame" id="frame-right">
        <img id="img-right" />
        <div class="crosshair" id="cross-right"></div>
      </div>
    </div>

    <div id="zoom-badge">100%</div>
  </div>

</div>
<script>
(() => {
  // ── Constants ──────────────────────────────────────────────────────────
  const MIN_SCALE = 0.5;   // minimum zoom within a frame
  const MAX_SCALE = 20;    // maximum zoom within a frame

  // ── State ──────────────────────────────────────────────────────────────

  // Layout
  let sizePct   = 50;
  let imgWidth  = 0;   // computed from sizePct + viewer size
  let gap       = 4;

  // In-frame zoom/pan (shared scale, independent translations)
  let imgScale = 1;   // zoom level applied to both images inside their frames
  let ltx = 0, lty = 0;  // left image translation within its frame
  let rtx = 0, rty = 0;  // right image translation within its frame

  // Row is always centered — no manual pan state
  let rowX = 0, rowY = 0;

  // Drag state (pans images within frames)
  let dragging = false;
  let dragStartX = 0, dragStartY = 0;
  let ltxStart = 0, ltyStart = 0;

  let zoomTimer = null;

  // ── Elements ───────────────────────────────────────────────────────────
  const viewer     = document.getElementById('viewer');
  const row        = document.getElementById('row');
  const frameLeft  = document.getElementById('frame-left');
  const frameRight = document.getElementById('frame-right');
  const imgLeft    = document.getElementById('img-left');
  const imgRight   = document.getElementById('img-right');
  const frameGap   = document.getElementById('frame-gap');
  const hint       = document.getElementById('hint');
  const zoomBadge  = document.getElementById('zoom-badge');
  const crossLeft  = document.getElementById('cross-left');
  const crossRight = document.getElementById('cross-right');

  const fileLeft   = document.getElementById('file-left');
  const fileRight  = document.getElementById('file-right');
  const nameLeft   = document.getElementById('name-left');
  const nameRight  = document.getElementById('name-right');

  const ctrlSize   = document.getElementById('ctrl-size');
  const valSize    = document.getElementById('val-size');
  const ctrlGap    = document.getElementById('ctrl-gap');
  const valGap     = document.getElementById('val-gap');

  const btnSwap    = document.getElementById('btn-swap');
  const btnCenter  = document.getElementById('btn-center');
  const btnFit     = document.getElementById('btn-fit');
  const btnReset   = document.getElementById('btn-reset');

  // ── Helpers ────────────────────────────────────────────────────────────
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  // The image width that makes both frames exactly fill the viewport (100%)
  function maxFitWidth() {
    const vw = viewer.clientWidth;
    const vh = viewer.clientHeight;
    const byWidth = (vw - gap) / 2;
    let byHeight = Infinity;
    if (imgLeft.naturalWidth)  byHeight = Math.min(byHeight, vh * imgLeft.naturalWidth  / imgLeft.naturalHeight);
    if (imgRight.naturalWidth) byHeight = Math.min(byHeight, vh * imgRight.naturalWidth / imgRight.naturalHeight);
    return Math.floor(Math.min(byWidth, byHeight === Infinity ? byWidth : byHeight));
  }

  function updateImgWidth() {
    imgWidth = Math.round(sizePct / 100 * maxFitWidth());
  }

  function frameHeight() {
    // Use the taller of the two images (or fallback)
    const lh = imgLeft.naturalWidth
      ? Math.round((imgWidth / imgLeft.naturalWidth) * imgLeft.naturalHeight)
      : null;
    const rh = imgRight.naturalWidth
      ? Math.round((imgWidth / imgRight.naturalWidth) * imgRight.naturalHeight)
      : null;
    if (lh && rh) return Math.max(lh, rh);
    return lh || rh || Math.round(imgWidth * 0.75);
  }

  // ── Apply transforms ───────────────────────────────────────────────────

  function applyImageTransforms() {
    imgLeft.style.transform  = `translate(${ltx}px, ${lty}px) scale(${imgScale})`;
    imgRight.style.transform = `translate(${rtx}px, ${rty}px) scale(${imgScale})`;
  }

  function applyRowTransform() {
    row.style.transform = `translate(${rowX}px, ${rowY}px)`;
  }

  // ── Layout ─────────────────────────────────────────────────────────────

  function applyLayout() {
    const fh = frameHeight();

    frameLeft.style.width   = imgWidth + 'px';
    frameLeft.style.height  = fh + 'px';
    frameRight.style.width  = imgWidth + 'px';
    frameRight.style.height = fh + 'px';

    imgLeft.style.width  = imgWidth + 'px';
    imgLeft.style.height = 'auto';
    imgRight.style.width = imgWidth + 'px';
    imgRight.style.height = 'auto';

    frameGap.style.width = gap + 'px';
  }

  function centerRow() {
    const vw = viewer.clientWidth;
    const vh = viewer.clientHeight;
    const totalW = imgWidth * 2 + gap;
    const totalH = frameHeight();
    rowX = (vw - totalW) / 2;
    rowY = (vh - totalH) / 2;
    applyRowTransform();
  }

  function resetImagePan() {
    ltx = 0; lty = 0;
    rtx = 0; rty = 0;
    applyImageTransforms();
  }

  function resetImageZoom() {
    imgScale = 1;
    resetImagePan();
  }

  function fitAndCenter() {
    sizePct = 100;
    ctrlSize.value = 100;
    valSize.textContent = '100%';
    resetImageZoom();
    updateImgWidth();
    applyLayout();
    centerRow();
  }

  // ── File loading ───────────────────────────────────────────────────────
  let leftLoaded = false, rightLoaded = false;

  function loadFile(input, imgEl, nameEl, side) {
    const file = input.files[0];
    if (!file) return;
    nameEl.textContent = file.name;
    nameEl.classList.add('loaded');
    const url = URL.createObjectURL(file);
    imgEl.onload = () => {
      if (side === 'left')  leftLoaded  = true;
      if (side === 'right') rightLoaded = true;
      hint.classList.add('hidden');
      resetImageZoom();
      updateImgWidth();
      applyLayout();
      if (leftLoaded && rightLoaded) {
        centerRow();
      } else {
        centerRow();
      }
    };
    imgEl.src = url;
  }

  fileLeft.addEventListener('change',  () => loadFile(fileLeft,  imgLeft,  nameLeft,  'left'));
  fileRight.addEventListener('change', () => loadFile(fileRight, imgRight, nameRight, 'right'));

  // ── Controls ───────────────────────────────────────────────────────────
  ctrlSize.addEventListener('input', () => {
    sizePct = +ctrlSize.value;
    valSize.textContent = sizePct + '%';
    resetImageZoom();
    updateImgWidth();
    applyLayout();
    centerRow();
  });

  ctrlGap.addEventListener('input', () => {
    gap = +ctrlGap.value;
    valGap.textContent = gap + ' px';
    applyLayout();
    centerRow();
  });

  btnSwap.addEventListener('click', () => {
    const leftSrc  = imgLeft.src;
    const rightSrc = imgRight.src;
    const leftName  = nameLeft.textContent;
    const rightName = nameRight.textContent;
    const leftClass  = nameLeft.className;
    const rightClass = nameRight.className;
    imgLeft.src  = rightSrc;
    imgRight.src = leftSrc;
    nameLeft.textContent  = rightName;
    nameRight.textContent = leftName;
    nameLeft.className  = rightClass;
    nameRight.className = leftClass;
    resetImagePan();
  });

  btnCenter.addEventListener('click', resetImagePan);
  btnReset.addEventListener('click', () => {
    resetImageZoom();
    showZoomBadge();
  });

  // ── Zoom (scroll wheel) ────────────────────────────────────────────────
  //
  // The cursor can be over either frame. We read its position relative to
  // whichever frame it's over and use that (cx, cy) as the anchor point
  // for BOTH frames — keeping the same image pixel stationary in both.
  //
  viewer.addEventListener('wheel', (e) => {
    e.preventDefault();

    const leftRect  = frameLeft.getBoundingClientRect();
    const rightRect = frameRight.getBoundingClientRect();

    // Cursor position relative to each frame
    const cx_l = e.clientX - leftRect.left;
    const cy_l = e.clientY - leftRect.top;
    const cx_r = e.clientX - rightRect.left;
    const cy_r = e.clientY - rightRect.top;

    const overLeft  = cx_l >= 0 && cx_l <= leftRect.width  && cy_l >= 0 && cy_l <= leftRect.height;
    const overRight = cx_r >= 0 && cx_r <= rightRect.width && cy_r >= 0 && cy_r <= rightRect.height;

    // Anchor point within a frame (use whichever the cursor is over;
    // if neither, use the center of the frame)
    let cx, cy;
    if (overLeft)       { cx = cx_l; cy = cy_l; }
    else if (overRight) { cx = cx_r; cy = cy_r; }
    else                { cx = leftRect.width / 2; cy = leftRect.height / 2; }

    const zoomFactor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
    const newScale   = clamp(imgScale * zoomFactor, MIN_SCALE, MAX_SCALE);

    // Image pixel currently under the cursor anchor (using left image coords,
    // but both images share the same transform so the math is identical).
    const imgX = (cx - ltx) / imgScale;
    const imgY = (cy - lty) / imgScale;

    // New translations so that (imgX, imgY) stays at (cx, cy) in BOTH frames
    ltx = cx - imgX * newScale;
    lty = cy - imgY * newScale;
    rtx = cx - imgX * newScale;
    rty = cy - imgY * newScale;

    imgScale = newScale;
    applyImageTransforms();
    showZoomBadge();
  }, { passive: false });

  // ── Pan (drag within both frames) ─────────────────────────────────────
  viewer.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    dragging   = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    ltxStart   = ltx;
    ltyStart   = lty;
    viewer.classList.add('dragging');
  });

  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    ltx = ltxStart + dx;
    lty = ltyStart + dy;
    rtx = ltx;
    rty = lty;
    applyImageTransforms();
  });

  window.addEventListener('mouseup', () => {
    dragging = false;
    viewer.classList.remove('dragging');
  });

  // ── Touch support ──────────────────────────────────────────────────────
  let lastTouches = null;

  viewer.addEventListener('touchstart', (e) => {
    lastTouches = e.touches;
    if (e.touches.length === 1) {
      dragStartX = e.touches[0].clientX;
      dragStartY = e.touches[0].clientY;
      ltxStart   = ltx;
      ltyStart   = lty;
    }
  }, { passive: true });

  viewer.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && lastTouches?.length === 1) {
      const dx = e.touches[0].clientX - dragStartX;
      const dy = e.touches[0].clientY - dragStartY;
      ltx = ltxStart + dx;
      lty = ltyStart + dy;
      rtx = ltx;
      rty = lty;
      applyImageTransforms();
    } else if (e.touches.length === 2 && lastTouches?.length >= 2) {
      const prev = lastTouches;
      const prevDist = Math.hypot(prev[0].clientX - prev[1].clientX, prev[0].clientY - prev[1].clientY);
      const newDist  = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const leftRect = frameLeft.getBoundingClientRect();
      const cx = midX - leftRect.left;
      const cy = midY - leftRect.top;
      const zoomFactor = newDist / prevDist;
      const newScale   = clamp(imgScale * zoomFactor, MIN_SCALE, MAX_SCALE);
      const imgX = (cx - ltx) / imgScale;
      const imgY = (cy - lty) / imgScale;
      ltx = cx - imgX * newScale;
      lty = cy - imgY * newScale;
      rtx = cx - imgX * newScale;
      rty = cy - imgY * newScale;
      imgScale = newScale;
      applyImageTransforms();
      showZoomBadge();
    }
    lastTouches = e.touches;
  }, { passive: false });

  viewer.addEventListener('touchend', () => { lastTouches = null; });

  // ── Zoom badge ─────────────────────────────────────────────────────────
  function showZoomBadge() {
    zoomBadge.textContent = Math.round(imgScale * 100) + '%';
    zoomBadge.classList.add('visible');
    clearTimeout(zoomTimer);
    zoomTimer = setTimeout(() => zoomBadge.classList.remove('visible'), 1200);
  }

  // ── Crosshair ──────────────────────────────────────────────────────────
  //
  // On mousemove, compute which image-space point is under the cursor
  // (using the frame the cursor is actually over), then place the crosshair
  // at that same point in both frames.
  //
  function placeCrosshairs(cx, cy) {
    // (cx, cy) is cursor position relative to whichever frame it's over.
    // Both frames share ltx/lty/imgScale, so the frame-space coordinate is
    // identical in both — just position the crosshair element directly.
    const x = ltx + (cx - ltx);   // = cx  (kept explicit for clarity)
    const y = lty + (cy - lty);   // = cy

    crossLeft.style.left = cx + 'px';
    crossLeft.style.top  = cy + 'px';
    crossRight.style.left = cx + 'px';
    crossRight.style.top  = cy + 'px';
    crossLeft.classList.add('visible');
    crossRight.classList.add('visible');
  }

  viewer.addEventListener('mousemove', (e) => {
    const leftRect  = frameLeft.getBoundingClientRect();
    const rightRect = frameRight.getBoundingClientRect();
    const overLeft  = e.clientX >= leftRect.left  && e.clientX <= leftRect.right  && e.clientY >= leftRect.top && e.clientY <= leftRect.bottom;
    const overRight = e.clientX >= rightRect.left && e.clientX <= rightRect.right && e.clientY >= rightRect.top && e.clientY <= rightRect.bottom;

    if (overLeft) {
      placeCrosshairs(e.clientX - leftRect.left, e.clientY - leftRect.top);
    } else if (overRight) {
      placeCrosshairs(e.clientX - rightRect.left, e.clientY - rightRect.top);
    } else {
      crossLeft.classList.remove('visible');
      crossRight.classList.remove('visible');
    }
  });

  viewer.addEventListener('mouseleave', () => {
    crossLeft.classList.remove('visible');
    crossRight.classList.remove('visible');
  });

  // ── Init ───────────────────────────────────────────────────────────────
  updateImgWidth();
  applyLayout();
  centerRow();
  applyImageTransforms();

  window.addEventListener('resize', () => { updateImgWidth(); applyLayout(); centerRow(); });

  // ── Keyboard shortcuts ─────────────────────────────────────────────────
  window.addEventListener('keydown', (e) => {
    // Ignore when typing in an input
    if (e.target.tagName === 'INPUT') return;

    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
      e.preventDefault();
      const delta = e.key === 'ArrowRight' ? 2 : -2;
      sizePct = clamp(sizePct + delta, 10, 100);
      ctrlSize.value = sizePct;
      valSize.textContent = sizePct + '%';
      resetImageZoom();
      updateImgWidth();
      applyLayout();
      centerRow();
    }

    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
      e.preventDefault();
      const zoomFactor = e.key === 'ArrowUp' ? 1.1 : 1 / 1.1;
      const newScale = clamp(imgScale * zoomFactor, MIN_SCALE, MAX_SCALE);
      // Zoom toward the centre of the frames
      const cx = frameLeft.clientWidth  / 2;
      const cy = frameLeft.clientHeight / 2;
      const imgX = (cx - ltx) / imgScale;
      const imgY = (cy - lty) / imgScale;
      ltx = cx - imgX * newScale;
      lty = cy - imgY * newScale;
      rtx = ltx; rty = lty;
      imgScale = newScale;
      applyImageTransforms();
      showZoomBadge();
    }
  });
})();
</script>
</body>
</html>
