<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stereogram Viewer</title>
  <link rel="icon" href="favicon.ico" sizes="32x32" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="style.css" />
  <script defer src="https://umami.cloete.link/script.js" data-website-id="22cc2504-e600-4863-a48e-a114857abe0d"></script>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <h1>Stereogram Viewer</h1>
    <div class="divider"></div>

    <div class="file-group">
      <span class="file-label">Left</span>
      <label class="file-btn">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 1a.75.75 0 0 1 .75.75v5.5h5.5a.75.75 0 0 1 0 1.5h-5.5v5.5a.75.75 0 0 1-1.5 0v-5.5H1.75a.75.75 0 0 1 0-1.5h5.5v-5.5A.75.75 0 0 1 8 1z"/>
        </svg>
        Choose
        <input type="file" id="file-left" accept="image/*" />
      </label>
      <span class="file-name" id="name-left">none</span>
    </div>

    <div class="file-group">
      <span class="file-label">Right</span>
      <label class="file-btn">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 1a.75.75 0 0 1 .75.75v5.5h5.5a.75.75 0 0 1 0 1.5h-5.5v5.5a.75.75 0 0 1-1.5 0v-5.5H1.75a.75.75 0 0 1 0-1.5h5.5v-5.5A.75.75 0 0 1 8 1z"/>
        </svg>
        Choose
        <input type="file" id="file-right" accept="image/*" />
      </label>
      <span class="file-name" id="name-right">none</span>
    </div>

    <div class="divider"></div>

    <div class="ctrl-group">
      <span class="ctrl-label">Size</span>
      <input type="range" id="ctrl-size" min="10" max="100" value="50" step="1" />
      <span class="ctrl-value" id="val-size">50%</span>
    </div>

    <div class="ctrl-group">
      <span class="ctrl-label">Gap</span>
      <input type="range" id="ctrl-gap" min="0" max="30" value="4" step="1" />
      <span class="ctrl-value" id="val-gap">4 px</span>
    </div>

    <div class="ctrl-group">
      <span class="ctrl-label">Crop</span>
      <input type="range" id="ctrl-crop" min="10" max="100" value="100" step="1" />
      <span class="ctrl-value" id="val-crop">100%</span>
    </div>

    <div class="divider"></div>

    <div class="ctrl-group">
      <span class="ctrl-label">Examples</span>
      <select id="select-example">
        <option value="" selected>— load example —</option>
        <option value="flowers">Flowers</option>
        <option value="cathedral_landscape">Cathedral landscape</option>
        <option value="cathedral_portrait">Cathedral portrait</option>
      </select>
    </div>

    <div class="divider"></div>

    <button class="btn" id="btn-swap">⇄ Swap</button>
    <button class="btn" id="btn-center">Reset pan</button>
    <button class="btn" id="btn-reset">Reset zoom</button>
  </div>

  <!-- Viewer -->
  <div id="viewer">
    <div id="hint">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="4" y="12" width="24" height="40" rx="3"/>
        <rect x="36" y="12" width="24" height="40" rx="3"/>
        <line x1="16" y1="28" x2="16" y2="44"/>
        <line x1="8" y1="36" x2="24" y2="36"/>
        <circle cx="48" cy="36" r="7"/>
        <line x1="53" y1="41" x2="58" y2="46"/>
      </svg>
      <p>Choose left and right images to begin</p>
      <small>Scroll to zoom · Drag to pan</small>
    </div>

    <div id="row">
      <div class="frame" id="frame-left">
        <img id="img-left" />
        <div class="crosshair" id="cross-left"></div>
      </div>
      <div id="frame-gap"></div>
      <div class="frame" id="frame-right">
        <img id="img-right" />
        <div class="crosshair" id="cross-right"></div>
      </div>
    </div>

    <div id="zoom-badge">100%</div>
  </div>

  <!-- Instructions -->
  <div id="instructions">
    <div class="instr">
      <span class="key">scroll</span>
      <span>or</span>
      <span class="key">↑</span><span class="key">↓</span>
      <span>zoom</span>
    </div>
    <div class="instr">
      <span class="key">drag</span>
      <span>pan</span>
    </div>
    <div class="instr">
      <span class="key">←</span><span class="key">→</span>
      <span>size</span>
    </div>
  </div>

</div>
<script src="app.js"></script>
</body>
</html>
